<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MEMTAG14</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
}

/* =========================
   СТИЛЬ 1 (ОШИБКА)
========================= */
#screen1 {
    position: fixed;
    inset: 0;
    background: url("backround.jpg") no-repeat center;
    background-size: cover;
}

/* скрытая кнопка */
.hidden-btn {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 14%;
    width: 80%;
    height: 8%;
    opacity: 0;
    cursor: pointer;
}

/* =========================
   СТИЛЬ 2 (ПРОФИЛЬ)
========================= */
#screen2 {
    display: none;
    position: fixed;
    inset: 0;

    background: #0f1115;
    color: white;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 25px;
}

/* КРУГЛЫЙ АВАТАР */
.avatar {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: url("avatar.jpg") center/cover no-repeat;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* Telegram кнопка */
.tg-btn {
    display: flex;
    align-items: center;
    gap: 12px;

    padding: 18px 35px;
    min-width: 260px;

    border: none;
    border-radius: 35px;

    background: #2AABEE;
    color: white;

    font-size: 18px;
    cursor: pointer;
}

.tg-btn img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
}
</style>
</head>

<body>

<!-- СТИЛЬ 1 -->
<div id="screen1">
    <div class="hidden-btn" onclick="activate()"></div>
</div>

<!-- СТИЛЬ 2 -->
<div id="screen2">
    <div class="avatar"></div>

    <button class="tg-btn" onclick="openTG()">
        <img src="avatar.jpg">
        Telegram
    </button>
</div>

<!-- ЗВУК (ПО ВКРУГУ) -->
<audio id="sound" src="sound.mp3" loop></audio>

<script>
function activate() {
    const audio = document.getElementById("sound");

    audio.volume = 0.8;

    // запуск + зацикливание
    audio.currentTime = 0;
    audio.play().catch(e => console.log("audio blocked", e));

    setTimeout(() => {
        document.getElementById("screen1").style.display = "none";
        document.getElementById("screen2").style.display = "flex";
    }, 300);
}

function openTG() {
    window.location.href = "https://t.me/memtag14";
}
</script>

</body>
</html>
