<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>UI Switch</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
}

/* ===== экран 1 ===== */
.screen1 {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 591 / 1280;
    margin: auto;

    background: url("backround.jpg") no-repeat center;
    background-size: contain;
}

/* скрытая кнопка */
.hidden-btn {
    position: absolute;
    left: 6%;
    width: 88%;
    bottom: 9.5%;
    height: 6.5%;
    opacity: 0;
    cursor: pointer;
}

/* ===== экран 2 ===== */
.screen2 {
    display: none;
    height: 100vh;
    background: #0f0f0f;
    color: white;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* круглая картинка */
.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: url("avatar.jpg") center/cover;
    margin-bottom: 30px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* кнопка телеграм */
.tg-btn {
    padding: 15px 30px;
    border-radius: 25px;
    border: none;
    font-size: 18px;
    cursor: pointer;
    background: #2AABEE;
    color: white;
}
</style>
</head>

<body>

<!-- экран 1 -->
<div class="screen1" id="screen1">
    <div class="hidden-btn" onclick="go()"></div>
</div>

<!-- экран 2 -->
<div class="screen2" id="screen2">
    <div class="avatar"></div>
    <button class="tg-btn" onclick="openTG()">Telegram</button>
</div>

<audio id="audio" src="sound.mp3"></audio>

<script>
function go() {
    let audio = document.getElementById("audio");
    audio.play();

    setTimeout(() => {
        document.getElementById("screen1").style.display = "none";
        document.getElementById("screen2").style.display = "flex";
    }, 400);
}

function openTG() {
    window.location.href = "https://t.me/username"; // вставь свой ник
}
</script>

</body>
</html>
