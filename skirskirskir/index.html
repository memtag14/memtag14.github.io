<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MEMTAG14</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
}

/* ====== СТИЛЬ 1 (ОШИБКА) ====== */
#screen1 {
    position: fixed;
    inset: 0;
    background: url("backround.jpg") no-repeat center;
    background-size: cover;
}

/* невидимая кнопка поверх "Перезагрузить" */
.hidden-btn {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 12%;
    width: 80%;
    height: 8%;
    opacity: 0;
    cursor: pointer;
}

/* ====== СТИЛЬ 2 (НОВЫЙ ЭКРАН) ====== */
#screen2 {
    display: none;
    position: fixed;
    inset: 0;
    background: #0f1115;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 25px;
}

/* круглая фотка */
.avatar {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: url("https://picsum.photos/300") center/cover;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* большая кнопка Telegram */
.tg-btn {
    display: flex;
    align-items: center;
    justify-content: center;

    gap: 12px;

    padding: 18px 40px;
    min-width: 260px;

    border: none;
    border-radius: 35px;

    background: #2AABEE;
    color: white;

    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- ===== СТИЛЬ 1 ===== -->
<div id="screen1">
    <div class="hidden-btn" onclick="activate()"></div>
</div>

<!-- ===== СТИЛЬ 2 ===== -->
<div id="screen2">
    <div class="avatar"></div>

    <button class="tg-btn" onclick="openTG()">
        Telegram
    </button>
</div>

<!-- звук -->
<audio id="sound" src="sound.mp3"></audio>

<script>
function activate() {
    const audio = document.getElementById("sound");

    // звук при нажатии
    audio.play();

    // переключение экрана
    setTimeout(() => {
        document.getElementById("screen1").style.display = "none";
        document.getElementById("screen2").style.display = "flex";
    }, 300);
}

function openTG() {
    window.location.href = "https://t.me/memtag14"; // ← поменяй на свой
}
</script>

</body>
</html>
