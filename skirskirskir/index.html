<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MEMTAG14</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
}

/* ===== СТИЛЬ 1 (ОШИБКА) ===== */
#screen1 {
    position: fixed;
    inset: 0;
    background: url("backround.jpg") no-repeat center;
    background-size: cover;
}

/* скрытая кнопка поверх "Перезагрузить" */
.hidden-btn {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);

    /* 👉 подняли выше "Сведения" */
    bottom: 14%;
    width: 80%;
    height: 7%;

    opacity: 0;
}

/* ===== СТИЛЬ 2 (НОВЫЙ UI) ===== */
#screen2 {
    display: none;
    position: fixed;
    inset: 0;

    background: #0f1115;
    color: white;

    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* круглая картинка */
.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: url("avatar.jpg") center/cover;
    margin-bottom: 20px;
}

/* кнопка telegram */
.tg-btn {
    padding: 14px 28px;
    border-radius: 20px;
    border: none;
    background: #2AABEE;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<!-- ===== СТИЛЬ 1 ===== -->
<div id="screen1">
    <div class="hidden-btn" onclick="switchStyle()"></div>
</div>

<!-- ===== СТИЛЬ 2 ===== -->
<div id="screen2">
    <div class="avatar"></div>
    <button class="tg-btn" onclick="openTG()">Telegram</button>
</div>

<script>
function switchStyle() {
    document.getElementById("screen1").style.display = "none";
    document.getElementById("screen2").style.display = "flex";
}

function openTG() {
    window.location.href = "https://t.me/memtag14";
}
</script>

</body>
</html>
