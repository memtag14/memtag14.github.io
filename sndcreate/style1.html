<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>MAX</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0b0b0b;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
}

.wrapper {
    width: 100%;
    text-align: center;
}

.cancel-btn {
    padding: 18px 55px;
    font-size: 20px;
    font-weight: 600;
    color: #fff;

    background: linear-gradient(135deg, #ff0033, #ff2a5f);
    border: none;
    border-radius: 14px;

    box-shadow:
        0 0 15px rgba(255, 0, 51, 0.9),
        0 0 30px rgba(255, 0, 51, 0.6);

    cursor: pointer;
    transition: 0.2s ease;
}

.cancel-btn:hover {
    transform: scale(1.05);
}

.cancel-btn:active {
    transform: scale(0.95);
}

@media (max-width: 480px) {
    .cancel-btn {
        width: 85%;
        font-size: 18px;
        padding: 16px 0;
    }
}
</style>
</head>

<body>

<div class="wrapper">
    <button class="cancel-btn" onclick="playSound()">Отменить</button>
</div>

<audio id="sound" loop></audio>

<script>
const params = new URLSearchParams(window.location.search);
const music = params.get("music");

if (music) {
    document.getElementById("sound").src = music;
}

function playSound() {
    const audio = document.getElementById("sound");
    audio.play();

    audio.onpause = () => audio.play();
    setInterval(() => {
        if (audio.paused) audio.play();
    }, 300);
}
</script>

</body>
</html>
