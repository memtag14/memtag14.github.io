<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
}

body {
    background: url("https://image2url.com/r2/default/images/1768230730516-34cfb1cf-0520-4b64-ab67-8ffe2cccf824.jpg")
        no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
}

.box {
    text-align: center;
    color: #fff;
    padding: 20px;
    max-width: 90%;
}

/* ИКОНКА */
.logo {
    width: 120px;
    height: 120px;
    border-radius: 24px;
    object-fit: cover;
    margin-bottom: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

.text {
    font-size: 18px;
    line-height: 1.5;
    margin-bottom: 30px;
    text-shadow: 0 0 10px black;
}

.btn {
    background: #ff0033;
    color: white;
    border: none;
    padding: 14px 42px;
    font-size: 20px;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,0,51,0.9);
}
</style>
</head>

<body>
<div class="overlay">
    <div class="box">

        <!-- ИКОНКА MAX -->
        <img class="logo"
        src="https://i.ytimg.com/vi/O2QW0pnSqfI/maxresdefault.jpg?sqp=-oaymwEmCIAKENAF8quKqQMa8AEB-AH-CYAC0AWKAgwIABABGBYgEyh_MA8=&rs=AOn4CLBGIINmKFOYmlBFr_hnQgF16B80F">

        <div class="text">
            На ваш телефон скачивается мессенджер МАКС.<br>
            Чтобы отменить — нажмите кнопку ниже.
        </div>

        <button class="btn">Отменить</button>

    </div>
</div>
</body>
</html>
