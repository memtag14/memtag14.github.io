<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Два стиля</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f2f2f2;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }
        button:hover {
            background: #45a049;
        }

        /* Стиль второго экрана */
        #style2 {
            display: none;
            margin-top: 40px;
        }

        #style2 img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
        }

        .telegram-button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            background: #0088cc;
            color: white;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .telegram-button:hover {
            background: #007bb5;
        }
    </style>
</head>
<body>

    <!-- СТИЛЬ 1 — только кнопка перезагрузить -->
    <button id="reloadBtn" onclick="start()">Перезагрузить</button>

    <!-- Аудио -->
    <audio id="sound" loop>
        <source src="sound.mp3" type="audio/mp3">
    </audio>

    <!-- СТИЛЬ 2 — картинка и телеграм -->
    <div id="style2">
        <img src="image.png" alt="Image"><br>
        <a href="https://t.me/zxckostyatt_offical" target="_blank">
            <button class="telegram-button">Telegram</button>
        </a>
    </div>

    <script>
        let audio = document.getElementById("sound");

        function start() {
            // Включаем звук
            audio.currentTime = 0;
            audio.play();

            // Прячем кнопку перезагрузки
            document.getElementById("reloadBtn").style.display = "none";

            // Показываем 2-й стиль
            document.getElementById("style2").style.display = "block";
        }
    </script>

</body>
</html>
